name: Update AI News Snapshot

on:
  workflow_dispatch:
    inputs:
      force_tikhub:
        description: "Force a paid TikHub refresh even before its normal interval"
        required: false
        default: false
        type: boolean
  schedule:
    # GitHub drops (not just delays) a meaningful fraction of schedule
    # events during high load, and load peaks hardest exactly on the
    # hour/half-hour because that's where most repos' cron jobs land.
    # Offsetting off those round minutes cuts the drop rate, but does not
    # eliminate it - re-measured 2026-07-17 via `gh run list
    # --workflow=update-news.yml --json createdAt,event,conclusion` filtered
    # to event=schedule (only ~13.8h of run history survives an earlier
    # security-driven log cleanup, so this is the full available window, not
    # a sample): with the once-offset "7,37 * * * *" (nominal 30 min /
    # 48-a-day), the 10 schedule runs between 2026-07-16T11:19Z and
    # 2026-07-17T01:04Z produced 9 gaps with a 91.2 min median (P90 105 min,
    # max 134 min) - actual throughput ~17-18 runs/day vs the 48/day the
    # cron nominally implies, i.e. still a chronic ~2-3x under-delivery, not
    # a one-off incident. Moving to 4 ticks/hour (15 min nominal spacing)
    # trades more wasted ticks for a shorter worst-case gap under the same
    # drop rate; execution itself remains fast (all runs in this window
    # completed in under 2 minutes with none queued/stuck), so the ticks
    # themselves are still what's being dropped, not run execution.
    - cron: "7,22,37,52 * * * *"
    # 2026-07-17T05:47Z re-registration touch: this cron value shipped at
    # 03:12Z but produced zero schedule triggers in the ~2.5h since (vs. ~10
    # expected ticks), while workflow state=active, no queued/in_progress
    # runs stuck in the concurrency group, actionlint reports 0 issues on
    # this file, and githubstatus.com shows Actions fully operational - none
    # of the other failure modes apply. Touching the file again to force
    # GitHub to re-read the schedule definition.

# Queue runs instead of cancelling: a schedule tick that starts while a
# manual dispatch (or a previous tick) is still pushing must wait its turn,
# not race it or kill it mid-push. cancel-in-progress: true previously let a
# newer trigger cancel an in-flight run partway through git push, which is
# how the concurrent-run race happened.
concurrency:
  group: update-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare OPML
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          mkdir -p feeds
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
            echo "Loaded feeds/follow.opml from FOLLOW_OPML_B64 secret"
          elif [ -f feeds/follow.example.opml ]; then
            cp feeds/follow.example.opml feeds/follow.opml
            echo "Loaded public demo OPML from feeds/follow.example.opml"
          else
            echo "No OPML file available; RSS OPML is optional"
          fi

      - name: Update data
        env:
          EMAIL_DIGEST_ENABLED: ${{ secrets.EMAIL_DIGEST_ENABLED || vars.EMAIL_DIGEST_ENABLED }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
          AGENTMAIL_API_BASE_URL: ${{ vars.AGENTMAIL_API_BASE_URL }}
          AGENTMAIL_LIMIT: ${{ vars.AGENTMAIL_LIMIT }}
          AGENTMAIL_ALLOWED_SENDER_DOMAINS: ${{ vars.AGENTMAIL_ALLOWED_SENDER_DOMAINS }}
          # Paid X/social sources (X API, SocialData, TikHub): keys live in
          # secrets; optional tuning variables override code defaults.
          # Policy is key-first: a key present => the source runs; ENABLED is
          # optional and only needs setting to 0 to force it off.
          X_API_ENABLED: ${{ secrets.X_API_ENABLED || vars.X_API_ENABLED }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SOCIALDATA_ENABLED: ${{ secrets.SOCIALDATA_ENABLED || vars.SOCIALDATA_ENABLED }}
          SOCIALDATA_API_KEY: ${{ secrets.SOCIALDATA_API_KEY }}
          SOCIALDATA_QUERY: ${{ vars.SOCIALDATA_QUERY }}
          SOCIALDATA_SEARCH_TYPE: ${{ vars.SOCIALDATA_SEARCH_TYPE }}
          SOCIALDATA_MAX_RESULTS: ${{ vars.SOCIALDATA_MAX_RESULTS }}
          SOCIALDATA_DAILY_TWEET_LIMIT: ${{ vars.SOCIALDATA_DAILY_TWEET_LIMIT }}
          SOCIALDATA_RUN_INTERVAL_HOURS: ${{ vars.SOCIALDATA_RUN_INTERVAL_HOURS }}
          SOCIALDATA_RUN_UTC_HOUR: ${{ vars.SOCIALDATA_RUN_UTC_HOUR }}
          SOCIALDATA_RUN_UTC_MINUTE_MAX: ${{ vars.SOCIALDATA_RUN_UTC_MINUTE_MAX }}
          SOCIALDATA_LIST_ID: ${{ vars.SOCIALDATA_LIST_ID }}
          SOCIALDATA_LIST_ENABLED: ${{ vars.SOCIALDATA_LIST_ENABLED }}
          SOCIALDATA_LIST_MAX_RESULTS: ${{ vars.SOCIALDATA_LIST_MAX_RESULTS }}
          SOCIALDATA_LIST_EXCLUDE: ${{ vars.SOCIALDATA_LIST_EXCLUDE }}
          TIKHUB_ENABLED: ${{ secrets.TIKHUB_ENABLED || vars.TIKHUB_ENABLED }}
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          TIKHUB_API_BASE_URL: ${{ vars.TIKHUB_API_BASE_URL }}
          TIKHUB_QUERY: ${{ vars.TIKHUB_QUERY }}
          TIKHUB_PLATFORMS: ${{ vars.TIKHUB_PLATFORMS }}
          TIKHUB_MAX_RESULTS: ${{ vars.TIKHUB_MAX_RESULTS }}
          TIKHUB_DAILY_ITEM_LIMIT: ${{ vars.TIKHUB_DAILY_ITEM_LIMIT }}
          TIKHUB_RUN_INTERVAL_HOURS: ${{ vars.TIKHUB_RUN_INTERVAL_HOURS }}
          TIKHUB_RUN_UTC_HOUR: ${{ vars.TIKHUB_RUN_UTC_HOUR }}
          TIKHUB_RUN_UTC_MINUTE_MAX: ${{ vars.TIKHUB_RUN_UTC_MINUTE_MAX }}
          TIKHUB_FORCE_RUN: ${{ inputs.force_tikhub && '1' || '' }}
          RSS_MAX_FEEDS: ${{ vars.RSS_MAX_FEEDS || 10 }}
        run: |
          if [ -f feeds/follow.opml ]; then
            python scripts/update_news.py --output-dir data --window-hours 24 --archive-days 21 --rss-opml feeds/follow.opml --rss-max-feeds "${RSS_MAX_FEEDS:-10}"
          else
            python scripts/update_news.py --output-dir data --window-hours 24 --archive-days 21
          fi

      - name: Commit and push changes
        env:
          EMAIL_DIGEST_PUBLISH: ${{ secrets.EMAIL_DIGEST_PUBLISH || vars.EMAIL_DIGEST_PUBLISH }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage the whole data dir so newly added output files can never be
          # silently dropped again (the daily-brief/stories-merged freeze was
          # caused by a stale filename whitelist here). .gitignore keeps
          # data/email-digest.json out of this add.
          git add data/
          if [ -f data/email-digest.json ] && [ "$EMAIL_DIGEST_PUBLISH" = "1" ]; then
            git add -f data/email-digest.json
          fi
          # Self-check: fail loudly if anything under data/ is still unstaged,
          # instead of green-but-stale runs.
          if [ -n "$(git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]' || true)" ]; then
            echo "::error::Generated files under data/ were not staged:"
            git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]'
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update ai news snapshot"

          max_attempts=3
          attempt=1
          until git push; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::git push failed after $max_attempts attempts"
              exit 1
            fi
            echo "::warning::git push failed (attempt $attempt/$max_attempts), rebasing onto origin/master and retrying"
            git fetch origin master
            # Rebase's ours/theirs is inverted from merge: "ours" is the
            # branch being rebased onto (origin/master), "theirs" is the
            # commit being replayed (this run's own commit). -X theirs keeps
            # this run's freshly generated data/*.json snapshot and lets the
            # older remote snapshot step aside on conflict, which is the
            # correct outcome since data/ is fully regenerated every run.
            git rebase origin/master -X theirs
            attempt=$((attempt + 1))
          done
