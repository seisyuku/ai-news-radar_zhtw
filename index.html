<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI News Radar｜24 小時 AI 更新雷達</title>
    <meta
      name="description"
      content="自動整理過去 24 小時值得看的 AI 的產業官方消息、模型跑分、資安管理與媒體分析訊息，以全球視角重新為您播報"
    />
    <link rel="canonical" href="https://seisyuku.github.io/ai-news-radar_zhtw/" />
    <meta property="og:title" content="AI News Radar｜24 小時 AI 更新雷達" />
    <meta
      property="og:description"
      content="自動整理過去 24 小時值得看的 AI 的產業官方消息、模型跑分、資安管理與媒體分析訊息，以全球視角重新為您播報"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seisyuku.github.io/ai-news-radar_zhtw/" />
    <meta property="og:site_name" content="AI News Radar" />
    <meta property="og:image" content="https://seisyuku.github.io/ai-news-radar_zhtw/assets/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AI News Radar｜24 小時 AI 情報雷達" />
    <meta name="application-name" content="AI News Radar" />
    <meta name="theme-color" content="#f6f6f2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AI News Radar" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI News Radar｜24 小時 AI 更新雷達" />
    <meta
      name="twitter:description"
      content="自動整理過去 24 小時值得看的 AI 的產業官方消息、模型跑分、資安管理與媒體分析訊息，以全球視角重新為您播報"
    />
    <meta name="twitter:image" content="https://seisyuku.github.io/ai-news-radar_zhtw/assets/og-image.jpg" />
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
    <link rel="icon" href="./assets/icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./assets/styles.css?v=taste-ui-0721c" />
  </head>
  <body>
    <a class="skip-link" href="#bolePicksWrap">跳到今日重點訊號</a>
    <main class="shell">
      <header class="hero">
        <div class="hero-main">
          <div class="hero-headline">
            <img class="hero-logo" src="./assets/logo.svg" alt="AI News Radar Logo" />
            <div>
              <p class="hero-tag">AI INTELLIGENCE RADAR</p>
              <h1>AI News Radar</h1>
            </div>
          </div>
        </div>
        <div class="hero-meta">
          <a
            class="hero-link"
            href="https://github.com/seisyuku/ai-news-radar_zhtw"
            target="_blank"
            rel="noopener noreferrer"
          >GitHub</a>
          <span class="updated-label">更新時間</span>
          <span class="updated" id="updatedAt">載入中...</span>
        </div>

        <div class="stale-banner" id="staleBanner" hidden></div>

        <section class="stats" id="stats"></section>

        <section class="section-nav-wrap" aria-label="內容欄目">
          <div class="section-tabs" id="sectionTabs" role="tablist" aria-label="AI 新聞欄目"></div>
          <div class="section-scroll-hint" aria-hidden="true">左右滑動，檢視更多欄目 →</div>
          <div class="section-summary" id="sectionSummary">正在整理欄目...</div>
        </section>
      </header>

      <section class="primary-controls">
        <input id="searchInput" type="search" placeholder="搜尋 AI 訊號 / 來源" aria-label="搜尋 AI 訊號或來源" />
        <details class="advanced-panel">
          <summary>
            <span>高階篩選</span>
          </summary>
          <div class="advanced-content">
            <div class="advanced-controls">
              <label class="field">
                <span>時間範圍</span>
                <select id="timeRangeSelect" aria-label="時間範圍">
                  <option value="24h">過去 24 小時</option>
                </select>
              </label>
              <label class="field">
                <span>來源型別</span>
                <select id="sourceTypeSelect">
                  <option value="">全部來源</option>
                  <option value="official">官方 / 一手</option>
                  <option value="media">精選媒體 / 日報</option>
                  <option value="community">社群 / HN / Builders</option>
                  <option value="rss">RSS / OPML</option>
                  <option value="aggregate">聚合源</option>
                  <option value="advanced">進階源</option>
                </select>
              </label>
              <label class="field">
                <span>內容型別</span>
                <select id="sectionSelect"></select>
              </label>
              <label class="field">
                <span>訊號等級</span>
                <select id="signalLevelSelect">
                  <option value="">全部訊號</option>
                  <option value="high">高優先順序</option>
                  <option value="curated">精選 / 官方</option>
                  <option value="multi">多源驗證</option>
                </select>
              </label>
              <label class="field">
                <span>具體來源</span>
                <select id="siteSelect">
                  <option value="">全部站點</option>
                </select>
              </label>
              <div class="field">
                <span>內容範圍</span>
                <div class="mode-switch">
                  <button id="modeSelectedBtn" class="mode-btn active" type="button" aria-pressed="true">精選</button>
                  <button id="modeAiBtn" class="mode-btn" type="button" aria-pressed="false">全部 AI</button>
                  <button id="modeAllBtn" class="mode-btn" type="button" aria-pressed="false">全量原始</button>
                </div>
              </div>
              <label id="allDedupeWrap" class="all-dedupe" for="allDedupeToggle">
                <input id="allDedupeToggle" type="checkbox" checked />
                <span class="all-dedupe-dot"></span>
                <span id="allDedupeLabel">去重開</span>
              </label>
            </div>
            <div class="source-health" id="sourceHealth">源狀態載入中...</div>
            <details class="source-detail-panel">
              <summary>檢視源狀態詳情</summary>
              <div class="source-health-details" id="sourceHealthDetails"></div>
              <section class="coverage-strip" id="coverageStrip" aria-label="Source coverage status"></section>
              <section class="source-status-table" id="sourceStatusTable" aria-label="源狀態詳情"></section>
              <section class="site-pills" id="sitePills"></section>
            </details>
          </div>
        </details>
        <button class="clear-filters-btn" id="clearFiltersBtn" type="button" hidden>清除篩選</button>
      </section>

      <section class="bole-picks-wrap" aria-label="今日 Top 3" id="bolePicksWrap">
        <div class="bole-picks-head">
          <div>
            <p class="section-eyebrow">TODAY'S SIGNALS</p>
            <h2 id="topStoriesTitle">今日重點訊號</h2>
          </div>
          <div class="bole-head-tools">
            <div class="bole-view-toggle" id="boleViewToggle" hidden>
              <button id="boleHotBtn" class="mode-btn" type="button" aria-pressed="false">當前熱點</button>
              <button id="boleTimelineBtn" class="mode-btn" type="button" aria-pressed="false">時間線</button>
            </div>
            <span id="bolePicksMeta">按評分排序</span>
          </div>
        </div>
        <div id="bolePicksList" class="bole-board"></div>
      </section>

      <section class="waytoagi-wrap">
        <div class="waytoagi-head">
          <h2>社群更新 · WaytoAGI</h2>
          <div class="waytoagi-tools">
            <div class="waytoagi-switch">
              <button id="waytoagiTodayBtn" class="waytoagi-btn active" type="button" aria-pressed="true">最近更新日</button>
              <button id="waytoagi7dBtn" class="waytoagi-btn" type="button" aria-pressed="false">近7日</button>
            </div>
            <span id="waytoagiUpdatedAt">載入中...</span>
          </div>
        </div>
        <div id="waytoagiMeta" class="waytoagi-meta"></div>
        <div id="waytoagiList" class="waytoagi-list"></div>
      </section>

      <section class="list-wrap">
        <div class="list-head">
          <h2 id="listTitle">全量 AI 情報源</h2>
          <div class="list-head-tools">
            <div class="list-sort-tools" id="listSortTools" role="group" aria-label="全量列表排序">
              <button class="list-sort-btn active" type="button" data-sort="priority" title="綜合來源權重、AI相關度、新鮮度與訊號強度">綜合</button>
              <button class="list-sort-btn" type="button" data-sort="latest" title="按釋出時間或發現時間倒序">最新</button>
              <button class="list-sort-btn" type="button" data-sort="ai" title="按高相關度訊號倒序">高分</button>
              <button class="list-sort-btn" type="button" data-sort="source" title="按來源聚合度整理">來源</button>
            </div>
            <span id="resultCount">0 條</span>
          </div>
        </div>
        <div id="newsList" class="news-list" aria-live="polite"></div>
      </section>

    </main>

    <footer class="app-footer">
      <span id="appVersionTag"></span>
      <p class="app-footer-note">
        本站目前仍在功能測試階段，如發現翻譯錯誤、分類誤判或版面異常，歡迎至
        <a href="https://github.com/seisyuku/ai-news-radar_zhtw/issues" target="_blank" rel="noopener noreferrer">GitHub 提出 Issue</a>，協助我們持續精進內容品質。
      </p>
    </footer>

    <template id="itemTpl">
      <article class="news-card">
        <a class="title" target="_blank" rel="noopener noreferrer"></a>
        <div class="meta-row">
          <span class="site"></span>
          <span class="category"></span>
          <span class="source"></span>
          <time class="time"></time>
        </div>
        <p class="news-summary"></p>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js" integrity="sha384-HOvlOYPIs/zjoIkWUGXkVmXsjr8GuZLV+Q+rcPwmJOVZVpvTSXQChiN4t9Euv9Vc" crossorigin="anonymous" defer></script>
    <script src="./assets/motion.js?v=taste-ui-0721c" defer></script>
    <script src="./assets/app.js?v=taste-ui-0721c" defer></script>
  </body>
</html>
